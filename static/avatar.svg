<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="98" fill="#f5f5f0"/>

  <!-- 左耳 -->
  <circle cx="52" cy="42" r="28" fill="#1a1a1a"/>
  <!-- 右耳 -->
  <circle cx="148" cy="42" r="28" fill="#1a1a1a"/>

  <!-- 脸 -->
  <ellipse cx="100" cy="105" rx="72" ry="68" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <!-- 左眼眶 -->
  <ellipse cx="72" cy="92" rx="22" ry="20" fill="#1a1a1a" transform="rotate(-8 72 92)"/>
  <!-- 右眼眶 -->
  <ellipse cx="128" cy="92" rx="22" ry="20" fill="#1a1a1a" transform="rotate(8 128 92)"/>

  <!-- 左眼白 -->
  <ellipse cx="74" cy="90" rx="10" ry="11" fill="white"/>
  <!-- 右眼白 -->
  <ellipse cx="126" cy="90" rx="10" ry="11" fill="white"/>

  <!-- 左瞳孔 -->
  <circle cx="76" cy="91" r="5.5" fill="#1a1a1a"/>
  <!-- 右瞳孔 -->
  <circle cx="128" cy="91" r="5.5" fill="#1a1a1a"/>

  <!-- 左眼高光 -->
  <circle cx="78" cy="88" r="2" fill="white"/>
  <!-- 右眼高光 -->
  <circle cx="130" cy="88" r="2" fill="white"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="115" rx="8" ry="6" fill="#1a1a1a"/>

  <!-- 嘴巴 -->
  <path d="M92 120 Q100 130 108 120" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="60" cy="112" rx="12" ry="8" fill="#ffb3b3" opacity="0.5"/>
  <ellipse cx="140" cy="112" rx="12" ry="8" fill="#ffb3b3" opacity="0.5"/>
</svg>
