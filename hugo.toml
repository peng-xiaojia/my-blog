# ============================================
# Hugo 基础配置 (Blowfish 主题)
# ============================================
baseURL = 'https://peng-xiaojia.github.io/my-blog/'
theme = 'blowfish'
locale = 'zh-cn'
defaultContentLanguage = 'zh-cn'
title = 'XiaoJia'
enableRobotsTXT = true
enableEmoji = true
summaryLength = 30

[security]
  [security.http]
    urls = ['(?i)^https?://[a-z0-9]', '(?i)localhost']
    methods = ['(?i)GET|POST']

# ============================================
# 分页
# ============================================
[pagination]
  pagerSize = 10

# ============================================
# 分类 & 标签
# ============================================
[taxonomies]
  tag = 'tags'
  category = 'categories'
  series = 'series'

# ============================================
# 文章永久链接
# ============================================
[permalinks]
  posts = '/:year/:month/:slug/'

# ============================================
# 相关文章推荐
# ============================================
[related]
  threshold = 0
  toLower = false
  [[related.indices]]
    name = 'tags'
    weight = 100
  [[related.indices]]
    name = 'categories'
    weight = 100
  [[related.indices]]
    name = 'date'
    weight = 10

# ============================================
# 图片处理
# ============================================
[imaging]
  anchor = 'Center'

# ============================================
# Blowfish 主题参数
# ============================================
[params]
  # --- 配色 ---
  colorScheme = 'blowfish'
  defaultAppearance = 'dark'
  autoSwitchAppearance = true

  # --- 功能 ---
  enableSearch = true
  enableCodeCopy = true
  enableStructuredBreadcrumbs = true
  highlightCurrentMenuArea = true
  smartTOC = true
  smartTOCHideUnfocusedChildren = false

  # --- 默认图片 ---
  defaultBackgroundImage = '/img/background.svg'
  defaultFeaturedImage = '/img/featured.svg'

  # --- 头部 ---
  [params.header]
    layout = 'fixed-gradient'

  # --- 底部 ---
  [params.footer]
    showMenu = true
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true
    showScrollToTop = true

  # --- 首页 ---
  [params.homepage]
    layout = 'background'
    showRecent = true
    showRecentItems = 6
    showMoreLink = true
    showMoreLinkDest = 'posts'
    cardView = true
    cardViewScreenWidth = false
    layoutBackgroundBlur = true

  # --- 文章列表页 ---
  [params.list]
    showHero = true
    heroStyle = 'background'
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true
    showBreadcrumbs = true
    showSummary = false
    showTableOfContents = true
    showCards = true
    cardView = true
    cardViewScreenWidth = false
    groupByYear = false

  # --- 文章详情页 ---
  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = true
    showHero = true
    heroStyle = 'thumbAndBackground'
    layoutBackgroundBlur = true
    layoutBackgroundHeaderSpace = true
    showBreadcrumbs = true
    showDraftLabel = true
    showEdit = false
    showPagination = true
    showReadingTime = true
    showWordCount = true
    showTableOfContents = true
    showRelatedContent = true
    relatedContentLimit = 3
    showTaxonomies = true
    showCategories = true
    showTags = true
    showAuthorsBadges = true
    sharingLinks = ['email', 'linkedin', 'twitter']
    showZenMode = true

  # --- 分类/标签页 ---
  [params.taxonomy]
    showHero = true
    heroStyle = 'background'
    layoutBackgroundBlur = true
    showBreadcrumbs = true
    showTableOfContents = true
    cardView = true

  [params.term]
    showHero = true
    heroStyle = 'background'
    layoutBackgroundBlur = true
    showBreadcrumbs = true
    showTableOfContents = true
    cardView = true

  # --- SEO ---
  [params.seo]
    metaDescriptionOrder = ['summary', 'description', 'site']

  # --- 作者 ---
  [params.author]
    name = 'JJia'
    headline = '一个热爱技术和生活的博主'
  [[params.author.links]]
    name = 'github'
    url = 'https://github.com/peng-xiaojia'
    icon = 'github'
  [[params.author.links]]
    name = 'email'
    url = 'mailto:peng-xiaojia@users.noreply.github.com'
    icon = 'email'

# ============================================
# 主导航菜单
# ============================================
[[menu.main]]
  name = '文章'
  pageRef = '/posts'
  weight = 10

[[menu.main]]
  name = '分类'
  pageRef = '/categories'
  weight = 20

[[menu.main]]
  name = '标签'
  pageRef = '/tags'
  weight = 30

[[menu.main]]
  name = '关于'
  pageRef = '/about'
  weight = 40

# ============================================
# 底部菜单
# ============================================
[[menu.footer]]
  name = 'GitHub'
  url = 'https://github.com/peng-xiaojia'
  weight = 10

# ============================================
# 代码高亮
# ============================================
[markup.highlight]
  noClasses = false
  style = 'monokai'
