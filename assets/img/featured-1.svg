<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#fff9c4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg1)"/>
  <!-- 小柴犬 -->
  <g transform="translate(400, 370)">
    <ellipse cx="0" cy="25" rx="50" ry="38" fill="#ffe0b2"/>
    <circle cx="0" cy="-25" r="42" fill="#ffe0b2"/>
    <!-- 耳朵 (折耳) -->
    <path d="M-38,-40 Q-45,-80 -20,-55 Q-10,-45 -10,-40" fill="#ef6c00"/>
    <path d="M38,-40 Q45,-80 20,-55 Q10,-45 10,-40" fill="#ef6c00"/>
    <!-- 脸 -->
    <ellipse cx="0" cy="-8" rx="25" ry="22" fill="#fff3e0"/>
    <!-- 眼睛 -->
    <circle cx="-14" cy="-28" r="5" fill="#3e2723"/>
    <circle cx="14" cy="-28" r="5" fill="#3e2723"/>
    <circle cx="-12" cy="-30" r="1.5" fill="#fff"/>
    <circle cx="16" cy="-30" r="1.5" fill="#fff"/>
    <!-- 眉毛 -->
    <ellipse cx="-14" cy="-36" rx="6" ry="2" fill="#ef6c00" opacity="0.5"/>
    <ellipse cx="14" cy="-36" rx="6" ry="2" fill="#ef6c00" opacity="0.5"/>
    <!-- 鼻子 -->
    <ellipse cx="0" cy="-15" rx="6" ry="4" fill="#4e342e"/>
    <!-- 嘴 -->
    <path d="M-8,-9 Q0,-4 8,-9" fill="none" stroke="#4e342e" stroke-width="1.5"/>
    <line x1="0" y1="-11" x2="0" y2="-8" stroke="#4e342e" stroke-width="1.5"/>
    <!-- 腮红 -->
    <circle cx="-22" cy="-18" r="6" fill="#ff8a80" opacity="0.4"/>
    <circle cx="22" cy="-18" r="6" fill="#ff8a80" opacity="0.4"/>
    <!-- 尾巴 -->
    <path d="M45,15 Q70,0 65,-25 Q60,-40 50,-30" fill="#ffe0b2" stroke="#ef6c00" stroke-width="2"/>
  </g>
  <!-- 装饰 -->
  <circle cx="200" cy="480" r="15" fill="#ffcc80" opacity="0.5"/>
  <circle cx="900" cy="450" r="20" fill="#ffcc80" opacity="0.5"/>
  <circle cx="800" cy="520" r="12" fill="#ffcc80" opacity="0.5"/>
  <circle cx="350" cy="530" r="18" fill="#ffcc80" opacity="0.5"/>
</svg>
