<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f8e9"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg2)"/>
  <!-- 小兔子 -->
  <g transform="translate(350, 370)">
    <ellipse cx="0" cy="20" rx="35" ry="30" fill="#f5f5f5"/>
    <circle cx="0" cy="-25" r="35" fill="#f5f5f5"/>
    <!-- 长耳朵 -->
    <ellipse cx="-18" cy="-70" rx="10" ry="28" fill="#f5f5f5"/>
    <ellipse cx="-18" cy="-70" rx="5" ry="20" fill="#ffcdd2"/>
    <ellipse cx="18" cy="-70" rx="10" ry="28" fill="#f5f5f5"/>
    <ellipse cx="18" cy="-70" rx="5" ry="20" fill="#ffcdd2"/>
    <!-- 眼睛 -->
    <circle cx="-12" cy="-28" r="5" fill="#e91e63"/>
    <circle cx="12" cy="-28" r="5" fill="#e91e63"/>
    <circle cx="-10" cy="-30" r="2" fill="#fff"/>
    <circle cx="14" cy="-30" r="2" fill="#fff"/>
    <!-- 鼻子 -->
    <polygon points="0,-16 -4,-12 4,-12" fill="#f48fb1"/>
    <!-- 嘴 -->
    <path d="M-4,-11 Q0,-7 4,-11" fill="none" stroke="#f48fb1" stroke-width="1"/>
    <!-- 腮红 -->
    <circle cx="-20" cy="-18" r="5" fill="#ffcdd2" opacity="0.6"/>
    <circle cx="20" cy="-18" r="5" fill="#ffcdd2" opacity="0.6"/>
    <!-- 尾巴 -->
    <circle cx="40" cy="10" r="10" fill="#fff"/>
  </g>
  <!-- 小花 -->
  <g transform="translate(650, 420)">
    <circle cx="0" cy="-8" r="5" fill="#fff9c4"/>
    <circle cx="8" cy="2" r="5" fill="#fff9c4"/>
    <circle cx="-8" cy="2" r="5" fill="#fff9c4"/>
    <circle cx="5" cy="10" r="5" fill="#fff9c4"/>
    <circle cx="-5" cy="10" r="5" fill="#fff9c4"/>
    <circle cx="0" cy="2" r="5" fill="#ffcc80"/>
  </g>
  <g transform="translate(750, 450) scale(0.7)">
    <circle cx="0" cy="-8" r="5" fill="#e1bee7"/>
    <circle cx="8" cy="2" r="5" fill="#e1bee7"/>
    <circle cx="-8" cy="2" r="5" fill="#e1bee7"/>
    <circle cx="5" cy="10" r="5" fill="#e1bee7"/>
    <circle cx="-5" cy="10" r="5" fill="#e1bee7"/>
    <circle cx="0" cy="2" r="5" fill="#ce93d8"/>
  </g>
  <g transform="translate(550, 460) scale(0.5)">
    <circle cx="0" cy="-8" r="5" fill="#fff9c4"/>
    <circle cx="8" cy="2" r="5" fill="#fff9c4"/>
    <circle cx="-8" cy="2" r="5" fill="#fff9c4"/>
    <circle cx="5" cy="10" r="5" fill="#fff9c4"/>
    <circle cx="-5" cy="10" r="5" fill="#fff9c4"/>
    <circle cx="0" cy="2" r="5" fill="#ffcc80"/>
  </g>
  <!-- 蝴蝶 -->
  <g transform="translate(800, 300)">
    <ellipse cx="-15" cy="0" rx="15" ry="10" fill="#ffe082" opacity="0.7" transform="rotate(-20)"/>
    <ellipse cx="15" cy="0" rx="15" ry="10" fill="#ffe082" opacity="0.7" transform="rotate(20)"/>
    <ellipse cx="0" cy="0" rx="2" ry="10" fill="#795548"/>
  </g>
  <!-- 装饰草 -->
  <path d="M200,550 Q205,520 210,550" fill="none" stroke="#a5d6a7" stroke-width="2"/>
  <path d="M250,560 Q256,525 262,560" fill="none" stroke="#81c784" stroke-width="2"/>
  <path d="M950,550 Q955,518 960,550" fill="none" stroke="#a5d6a7" stroke-width="2"/>
</svg>
